{% extends "base.html" %}{% block content %}<section class="hero"><div><div class="eyebrow">Talepler</div><h1>İzin Talepleri</h1><p>Personel uygulamasından gelen izin talepleri.</p></div></section><div class="card"><table class="table"><tr><th>Personel</th><th>Tarih</th><th>Gün</th><th>Not</th><th>Durum</th><th>İşlem</th></tr>{% for r in rows %}<tr><td>{{r.full_name}}</td><td>{{r.start_date}} - {{r.end_date}}</td><td>{{r.days_count}}</td><td>{{r.note or '-'}}</td><td>{{r.status}}</td><td><a class="btn small" href="/admin/leave-requests/{{r.id}}/approve">Onayla</a></td></tr>{% endfor %}</table></div>{% endblock %}
