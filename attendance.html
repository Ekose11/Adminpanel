{% extends "base.html" %}{% block content %}<section class="hero"><div><div class="eyebrow">İzin</div><h1>İzinler</h1><p>İzin günleri puantajda gelmedi olarak kesilmez.</p></div></section><div class="card"><form method="post" class="form-grid"><div class="field"><label>Personel</label><select name="person_id">{% for p in people %}<option value="{{p.id}}">{{p.full_name}} - Kalan {{p.annual_leave_remaining}}</option>{% endfor %}</select></div><div class="field"><label>Başlangıç</label><input name="start_date" type="date" required></div><div class="field"><label>Bitiş</label><input name="end_date" type="date" required></div><button class="btn">İzin Ekle</button></form></div><div class="card"><table class="table"><tr><th>Personel</th><th>Tarih</th><th>Gün</th><th>Durum</th></tr>{% for r in rows %}<tr><td>{{r.full_name}}</td><td>{{r.start_date}} - {{r.end_date}}</td><td>{{r.days_count}}</td><td>{{r.status}}</td></tr>{% endfor %}</table></div>{% endblock %}
