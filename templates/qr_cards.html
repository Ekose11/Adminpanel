{% extends "base.html" %}
{% block content %}
<div class="hero"><div class="title">Tek QR Kart</div><div class="subtitle">Bütün personel aynı QR kodu okutur. Server, personeli uygulamadaki giriş tokenı ile tanır.</div></div>
<div class="card"><button class="btn btn-green" onclick="window.print()">Tek QR Kartı Yazdır</button></div>
<div class="single-qr-wrap">
  <div class="single-qr-card">
    <div class="qr-name">Personel Giriş / Çıkış QR</div>
    <div class="qr-note">Uygulamaya giriş yaptıktan sonra bu QR okutulur.</div>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=PERSONEL_SISTEMI_GIRIS" alt="Tek QR">
    <div class="qr-code">PERSONEL_SISTEMI_GIRIS</div>
    <div class="qr-note">Çift okutma koruması: 10 saniye</div>
  </div>
</div>
{% endblock %}
