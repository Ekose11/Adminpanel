{% extends "base.html" %}
{% block content %}
<div class="hero"><div class="title">QR Kartları</div><div class="subtitle">Her personel için server tarafından oluşturulan güvenli, kişiye özel QR kod.</div></div>
<div class="card"><button class="btn btn-green" onclick="window.print()">QR Kartlarını Yazdır</button></div>
<div class="qr-grid">
{% for p in rows %}
  <div class="qr-card">
    <img class="mini-logo" src="{{ url_for('static', filename='img/logo.svg') }}">
    <div class="qr-name">{{p.full_name}}</div>
    <div>{{p.department}}</div>
    <img class="qr-img" src="/admin/qr/{{p.id}}.svg" alt="QR">
    <div class="qr-code">Kişiye özel güvenli QR</div>
  </div>
{% endfor %}
</div>
{% endblock %}
