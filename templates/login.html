<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Boztek PRO</title><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head><body><div class="login-page"><div class="login-card"><h1>Boztek PRO</h1><p>Firma hesabınla giriş yap</p><form method="post"><input name="username" placeholder="Firma kullanıcı adı"><input name="password" type="password" placeholder="Şifre"><button class="btn" style="width:100%">Giriş Yap</button></form>{% with messages=get_flashed_messages() %}{% for m in messages %}<p style="color:#dc2626;font-weight:900">{{m}}</p>{% endfor %}{% endwith %}</div></div></body></html>
