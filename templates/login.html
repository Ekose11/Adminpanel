<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Giriş</title><link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"></head><body class="login-page"><div class="login-card"><div class="login-logo">◆</div><h1>Personel Sistemi</h1><p>Premium yönetim paneli</p><form method="post"><input name="username" placeholder="Kullanıcı adı" autocomplete="username"><input name="password" type="password" placeholder="Şifre" autocomplete="current-password"><button class="btn wide">Giriş Yap</button></form>{% with messages=get_flashed_messages() %}{% for m in messages %}<div class="login-error">{{m}}</div>{% endfor %}{% endwith %}</div></body></html>
