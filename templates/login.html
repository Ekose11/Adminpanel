<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Giriş</title><style>body{margin:0;height:100vh;display:grid;place-items:center;font-family:Arial;background:radial-gradient(circle at top,#123762,#07111f 55%,#020713);color:white}.box{width:min(420px,92vw);background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.16);border-radius:28px;padding:30px;box-shadow:0 25px 90px #0008}.logo{width:70px;height:70px;border-radius:24px;background:linear-gradient(135deg,#46b3ff,#183bff);display:grid;place-items:center;font-size:34px;font-weight:900;margin-bottom:14px}input,button{width:100%;padding:14px;border-radius:15px;margin:9px 0;border:1px solid rgba(255,255,255,.18)}input{background:rgba(255,255,255,.08);color:white}button{background:linear-gradient(135deg,#3aa0ff,#2865ff);color:white;font-weight:800;border:0}.err{color:#fca5a5}</style></head><body><form class="box" method="post"><div class="logo">P</div><h1>Premium Giriş</h1><p>Yönetim paneline giriş yapın</p>{% if error %}<p class="err">{{error}}</p>{% endif %}<input name="username" placeholder="Kullanıcı adı" required><input name="password" type="password" placeholder="Şifre" required><button>Giriş Yap</button><p>Varsayılan: eren / 1234</p></form></body></html>
