{% extends 'base.html' %}{% block content %}<h1>Avans / Maaş</h1><form method="post" class="panel"><select name="person_id">{% for p in people %}<option value="{{p.id}}">{{p.name}}</option>{% endfor %}</select><input name="amount" placeholder="Avans tutarı"><input type="month" name="month" value="{{month}}"><input name="note" placeholder="Not"><button>Avans Ekle</button></form><table><tr><th>Personel</th><th>Tutar</th><th>Ay</th><th>Not</th></tr>{% for r in rows %}<tr><td>{{r.name}}</td><td>{{r.amount}}</td><td>{{r.month}}</td><td>{{r.note}}</td></tr>{% endfor %}</table>{% endblock %}
