{% extends "base.html" %}{% block content %}<section class="hero"><div><div class="eyebrow">Finans</div><h1>Avanslar</h1><p>Avans bilgileri ilgili personele bildirim olarak düşer.</p></div></section><div class="card"><form method="post" class="form-grid"><div class="field"><label>Personel</label><select name="person_id">{% for p in people %}<option value="{{p.id}}">{{p.full_name}}</option>{% endfor %}</select></div><div class="field"><label>Tutar</label><input name="amount" type="number" step="0.01" required></div><div class="field full"><label>Not</label><input name="note"></div><button class="btn">Avans Ekle</button></form></div><div class="card"><table class="table"><tr><th>Personel</th><th>Tutar</th><th>Not</th><th>Durum</th></tr>{% for r in rows %}<tr><td>{{r.full_name}}</td><td>{{'%.2f'|format(r.amount|float)}} TL</td><td>{{r.note or '-'}}</td><td>{{r.status}}</td></tr>{% endfor %}</table></div>{% endblock %}
