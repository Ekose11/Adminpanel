<!doctype html><html lang="tr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Personel Sistemi</title><style>
:root{--bg:#07111f;--card:rgba(255,255,255,.08);--line:rgba(255,255,255,.14);--txt:#eef6ff;--mut:#9fb4d0;--blue:#3aa0ff;--ok:#22c55e;--bad:#ef4444;--warn:#f59e0b}*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at top left,#123762,#07111f 45%,#020713);color:var(--txt)}a{text-decoration:none;color:inherit}.wrap{display:flex;min-height:100vh}.side{width:250px;background:rgba(2,7,19,.72);border-right:1px solid var(--line);padding:22px;position:sticky;top:0;height:100vh}.brand{display:flex;align-items:center;gap:12px;margin-bottom:25px}.logo{width:48px;height:48px;border-radius:17px;background:linear-gradient(135deg,#46b3ff,#183bff);display:grid;place-items:center;font-weight:900;font-size:24px;box-shadow:0 0 35px #247cff66}.brand b{font-size:18px}.nav a{display:block;padding:13px 14px;margin:7px 0;border-radius:16px;color:#dbeafe;background:transparent}.nav a:hover,.nav a.active{background:rgba(58,160,255,.15);border:1px solid rgba(58,160,255,.25)}.main{flex:1;padding:28px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:20px;box-shadow:0 18px 70px rgba(0,0,0,.25);backdrop-filter:blur(14px)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}.stat h2{margin:4px 0;font-size:34px}.mut{color:var(--mut)}button,.btn{border:0;border-radius:14px;padding:11px 15px;background:linear-gradient(135deg,#3aa0ff,#2865ff);color:white;font-weight:700;cursor:pointer;display:inline-block}input,select{width:100%;padding:10px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:white}option{color:#111}table{width:100%;border-collapse:separate;border-spacing:0 9px}th{text-align:left;color:#9fb4d0;font-size:13px}td{background:rgba(255,255,255,.07);padding:12px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}td:first-child{border-radius:14px 0 0 14px;border-left:1px solid var(--line)}td:last-child{border-radius:0 14px 14px 0;border-right:1px solid var(--line)}.pill{padding:6px 10px;border-radius:99px;font-size:12px}.ok{background:#22c55e22;color:#86efac}.bad{background:#ef444422;color:#fca5a5}.warn{background:#f59e0b22;color:#fde68a}.formrow{display:grid;grid-template-columns:180px 1fr;gap:10px;margin:10px 0}@media(max-width:800px){.wrap{display:block}.side{width:100%;height:auto;position:relative}.main{padding:16px}.formrow{grid-template-columns:1fr}}
</style></head><body><div class="wrap"><aside class="side"><div class="brand"><div class="logo">P</div><div><b>Personel Sistemi</b><div class="mut">Premium Panel</div></div></div><nav class="nav"><a href="/dashboard">Dashboard</a><a href="/admin/qr">Tek QR</a><a href="/admin/shifts">Aylık Vardiya</a><a href="/admin/attendance">Giriş Çıkış</a><a href="/admin/puantaj">Ay Sonu Puantaj</a><a href="/logout">Çıkış</a></nav></aside><main class="main">{% block content %}{% endblock %}</main></div></body></html>
