{% extends 'base.html' %}{% block content %}<h1>Canlı Dashboard</h1><form><input type="month" name="month" value="{{month}}"><button>Göster</button></form><div class="cards">{% for p in people %}<div class="card {{'green' if p.last_action=='giris' else 'red' if p.last_action=='cikis' else ''}}"><h3>{{p.name}}</h3><p>Son durum: <b>{{p.last_action}}</b></p><p>Bu ay geldiği gün: {{p.came_days}}</p><p>Geç giriş: {{p.late}} | Erken çıkış: {{p.early}}</p><p>Net maaş: {{p.net_salary}} TL</p></div>{% endfor %}</div>{% endblock %}
