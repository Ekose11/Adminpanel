{% extends 'base.html' %}{% block content %}<div class="top"><div><h1>Aylık Vardiya Listesi</h1><div class="mut">Tarihleri net görebilmek için aylık kart/tablo düzeni</div></div><a class="btn" href="/admin/shifts.pdf?month={{ym}}">PDF İndir</a></div><form method="get" class="card"><div class="formrow"><label>Ay seç</label><input type="month" name="month" value="{{ym}}"></div><button>Ayı Göster</button></form><br><form method="post"><input type="hidden" name="month" value="{{ym}}"><div class="card"><table><tr><th>Tarih</th>{% for p in db.personnel %}<th>{{p.name}}</th>{% endfor %}</tr>{% for d in days %}<tr><td><b>{{d}}</b></td>{% for p in db.personnel %}<td><select name="shift_{{d}}_{{p.id}}"><option {% if get_shift(db,p.id,d)=='Sabah' %}selected{% endif %}>Sabah</option><option {% if get_shift(db,p.id,d)=='Akşam' %}selected{% endif %}>Akşam</option><option {% if get_shift(db,p.id,d)=='Gece' %}selected{% endif %}>Gece</option><option {% if get_shift(db,p.id,d)=='İzin' %}selected{% endif %}>İzin</option><option {% if get_shift(db,p.id,d)=='Kapalı' %}selected{% endif %}>Kapalı</option></select></td>{% endfor %}</tr>{% endfor %}</table><button>Vardiya Listesini Kaydet</button></div></form>{% endblock %}
