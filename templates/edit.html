{% extends "base.html" %}{% block content %}<section class="hero"><div><div class="eyebrow">Personel</div><h1>Personel Düzenle</h1><p>{{p.full_name}}</p></div></section><div class="card"><form method="post" class="form-grid"><div class="field"><label>Ad Soyad</label><input name="full_name" value="{{p.full_name}}" required></div><div class="field"><label>Bölüm</label><input name="department" value="{{p.department}}" required></div><div class="field"><label>Kullanıcı</label><input name="username" value="{{p.username or ''}}"></div><div class="field"><label>Şifre</label><input name="password" value="{{p.password or ''}}"></div><div class="field"><label>Telefon</label><input name="phone" value="{{p.phone or ''}}"></div><div class="field"><label>Fotoğraf URL</label><input name="photo_url" value="{{p.photo_url or ''}}"></div><div class="field full"><label>Adres</label><input name="address" value="{{p.address or ''}}"></div><div class="field"><label>Toplam İzin</label><input name="annual_leave_total" type="number" value="{{p.annual_leave_total}}"></div><div class="field"><label>Kullanılan İzin</label><input name="annual_leave_used" type="number" value="{{p.annual_leave_used}}"></div><div class="field"><label>Maaş</label><input name="salary" type="number" step="0.01" value="{{p.salary}}"></div><div class="field"><label>Vardiya Adı</label><input name="shift_name" value="{{p.shift_name or 'Sabah'}}"></div><div class="field"><label>Başlangıç</label><input type="time" name="shift_start" value="{{p.shift_start or '09:00'}}"></div><div class="field"><label>Bitiş</label><input type="time" name="shift_end" value="{{p.shift_end or '18:00'}}"></div><div class="field"><label>Durum</label><select name="active"><option value="1" {% if p.active %}selected{% endif %}>Aktif</option><option value="0" {% if not p.active %}selected{% endif %}>Pasif</option></select></div><button class="btn">Kaydet</button></form></div>{% endblock %}
