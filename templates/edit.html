{% extends "base.html" %}{% block content %}<div class="hero"><div><div class="title">Personel Düzenle</div><div class="subtitle">Telefon, adres ve fotoğraf bilgileri Kartvizitler sayfasında anlık görünür.</div></div><a class="btn" href="/admin/personnel-cards">Kartvizitleri Aç</a></div><div class="card"><form method="post" class="form-grid"><div class="field"><label>Ad Soyad</label><input name="full_name" value="{{p.full_name}}" required></div><div class="field"><label>Bölüm</label><input name="department" value="{{p.department}}" required></div><div class="field"><label>Kullanıcı</label><input name="username" value="{{p.username or ''}}"></div><div class="field"><label>Şifre</label><input name="password" value="{{p.password or ''}}"></div><div class="field"><label>Telefon</label><input name="phone" value="{{p.phone or ''}}" placeholder="0555 000 00 00"></div><div class="field"><label>Adres</label><input name="address" value="{{p.address or ''}}" placeholder="Adres bilgisi"></div><div class="field"><label>Fotoğraf URL</label><input name="photo_url" value="{{p.photo_url or ''}}" placeholder="/static/uploads/person_1.jpg veya https://..."></div><div class="field"><label>Toplam İzin</label><input name="annual_leave_total" type="number" value="{{p.annual_leave_total}}"></div><div class="field"><label>Kullanılan İzin</label><input name="annual_leave_used" type="number" value="{{p.annual_leave_used}}"></div><div class="field"><label>Maaş</label><input name="salary" type="number" step="0.01" value="{{p.salary}}"></div><div class="field"><label>Durum</label><select name="active"><option value="1" {% if p.active %}selected{% endif %}>Aktif</option><option value="0" {% if not p.active %}selected{% endif %}>Pasif</option></select></div><button class="btn">Kaydet</button></form></div>{% endblock %}
