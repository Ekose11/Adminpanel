{% extends 'base.html' %}{% block content %}<h1>İzinler</h1><form method="post" class="panel"><select name="person_id">{% for p in people %}<option value="{{p.id}}">{{p.name}}</option>{% endfor %}</select><input type="date" name="start_day"><input type="date" name="end_day"><input name="note" placeholder="Not"><button>İzin Kaydet</button></form><table><tr><th>Personel</th><th>Başlangıç</th><th>Bitiş</th><th>Not</th></tr>{% for r in rows %}<tr><td>{{r.name}}</td><td>{{r.start_day}}</td><td>{{r.end_day}}</td><td>{{r.note}}</td></tr>{% endfor %}</table>{% endblock %}
