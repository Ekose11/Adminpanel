{% extends 'base.html' %}{% block content %}<h1>Aylık Raporlar</h1><form><input type="month" name="month" value="{{month}}"><button>Göster</button><a class="btn" href="/reports/pdf?month={{month}}">Aylık Raporu PDF Al</a></form><table><tr><th>Personel</th><th>Geldiği Gün</th><th>Geç Giriş</th><th>Erken Çıkış</th><th>Avans</th><th>Net Maaş</th></tr>{% for p in people %}<tr><td>{{p.name}}</td><td>{{p.came_days}}</td><td>{{p.late}}</td><td>{{p.early}}</td><td>{{p.advance_total}}</td><td>{{p.net_salary}}</td></tr>{% endfor %}</table>{% endblock %}
