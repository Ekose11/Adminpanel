{% extends 'base.html' %}{% block content %}<h1>Personel Yönetimi</h1><form method="post" class="panel"><input name="name" placeholder="Personel adı" required><input name="salary" placeholder="Maaş"><input name="leave" placeholder="Yıllık izin" value="14"><button>Ekle</button></form><table><tr><th>Ad</th><th>Maaş</th><th>Yıllık izin</th><th></th></tr>{% for p in people %}<tr><td>{{p.name}}</td><td>{{p.salary}}</td><td>{{p.annual_leave_total}}</td><td><a class="danger" href="/personnel/delete/{{p.id}}">Sil</a></td></tr>{% endfor %}</table>{% endblock %}
