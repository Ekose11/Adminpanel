{% extends 'base.html' %}{% block content %}<div class="hero"><h1>Personeller</h1><p class="muted">Fotoğraf, telefon, adres, maaş ve izin bilgileri.</p></div><div class="card"><form method="post" action="/personnel/add" class="formgrid"><input class="input" name="name" placeholder="Ad Soyad" required><input class="input" name="username" placeholder="Kullanıcı adı" required><input class="input" name="password" placeholder="Şifre" value="1234"><input class="input" name="phone" placeholder="Telefon"><input class="input" name="address" placeholder="Adres"><input class="input" name="salary" type="number" step="0.01" placeholder="Maaş"><button class="btn">Personel Ekle</button></form></div><div class="grid" style="margin-top:16px">{% for p in personnel %}<div class="card"><div class="person-card"><img class="avatar" src="{{p.photo or '/static/default_avatar.svg'}}"><div><h3 style="margin:0">{{p.name}}</h3><div class="muted">📞 {{p.phone or '-'}}</div><div class="muted">📍 {{p.address or '-'}}</div></div></div><hr style="border-color:var(--line)"><form method="post" action="/personnel/{{p.id}}/edit" enctype="multipart/form-data" class="formgrid"><input class="input" name="name" value="{{p.name}}"><input class="input" name="phone" value="{{p.phone}}" placeholder="Telefon"><input class="input" name="address" value="{{p.address}}" placeholder="Adres"><input class="input" name="salary" type="number" step="0.01" value="{{p.salary}}"><input class="input" name="advance" type="number" step="0.01" value="{{p.advance}}" placeholder="Avans"><input class="input" name="photo" type="file" accept="image/*"><button class="btn">Kaydet</button><a class="btn" href="/payslip/{{p.id}}">Bordro</a></form></div>{% endfor %}</div>{% endblock %}
